<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHANGHAI LUXIOU | 数字化谈单中枢</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdn.staticfile.net/Sortable/1.15.2/Sortable.min.js"></script>

    <style>
        :root { --primary: #D4AF37; --accent: #C5A059; --bg: #050505; --surface: #121212; --text-main: #E2E8F0; --text-sub: #8A92A3; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text-main); font-family: -apple-system, sans-serif; padding: 20px; min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; background-image: radial-gradient(circle at top right, #1A1813, #000 70%);}
        
        .brand-card { background: rgba(255,255,255,0.03); backdrop-filter: blur(15px); border: 1px solid rgba(212,175,55,0.1); border-radius: 20px; padding: 25px 20px; text-align: center; margin-bottom: 25px; margin-top: 10px; }
        .brand-card h1 { margin: 0; font-size: 24px; letter-spacing: 4px; color: var(--primary); text-shadow: 0 0 15px rgba(212,175,55,0.3); }
        
        .btn-group { width: 100%; display: flex; flex-direction: column; gap: 12px; margin-bottom: 30px; }
        .radar-btn { display: flex; align-items: center; justify-content: center; width: 100%; padding: 16px; border-radius: 12px; font-weight: bold; font-size: 15px; text-decoration: none; color: #fff; letter-spacing: 1px; background: #111; border: 1px solid rgba(255,255,255,0.1);}
        .radar-btn:active { transform: scale(0.98); }
        .btn-a { border-color: #4facfe; color: #4facfe;}
        .btn-b { border-color: #7000ff; color: #a855f7;}
        .btn-c { border-color: #D4AF37; color: #D4AF37;}
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; flex: 1; padding-bottom: 30px;}
        .card { background: #111; border: 1px solid transparent; border-radius: 16px; overflow: hidden; position: relative; height: 160px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); cursor: pointer;}
        .card img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.7); transition: 0.3s;}
        .card-info { position: absolute; bottom: 0; width: 100%; padding: 12px 5px; font-size: 11px; text-align: center; font-weight: bold; background: linear-gradient(transparent, rgba(0,0,0,0.9)); color: #fff; pointer-events: none;}
        
        /* 模态框通用基础 */
        .modal-base { position: fixed; top: 100vh; left: 0; width: 100%; height: 100vh; background: #050505; z-index: 3000; transition: top 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); display: flex; flex-direction: column;}
        .modal-base.show { top: 0; }
        .m-header { height: 60px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; background: rgba(5,5,5,0.95); border-bottom: 1px solid rgba(212,175,55,0.2); flex-shrink: 0;}
        .m-title { font-size: 16px; font-weight: bold; color: var(--primary); }
        .m-close { color: #888; font-size: 28px; background: none; border: none; padding: 0 10px; cursor: pointer; }
        .m-body { flex: 1; overflow-y: auto; padding: 20px; -webkit-overflow-scrolling: touch; overscroll-behavior-y: contain; padding-bottom: 100px;}

        /* 背书库 */
        .e-seg { display: flex; background: #111; border-radius: 12px; padding: 6px; margin-bottom: 20px; border: 1px solid #222;}
        .e-tab { flex: 1; text-align: center; padding: 10px 0; font-size: 13px; font-weight: bold; color: #666; border-radius: 8px; transition: 0.3s;}
        .e-tab.active { background: #222; color: var(--primary);}
        .e-sec { display: none; flex-direction: column; }
        .e-sec.active { display: flex; }
        .upload-btn { background: #111; border: 1px dashed var(--primary); color: var(--primary); text-align: center; padding: 15px; border-radius: 12px; font-size: 13px; font-weight: bold; margin-bottom: 15px;}
        .e-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .e-item { position: relative; border-radius: 12px; overflow: hidden; background: #111; border: 1px solid rgba(212,175,55,0.3); height: 220px;}
        .e-item img { width: 100%; height: 100%; object-fit: cover;}
        .e-item .del { position: absolute; top: 8px; right: 8px; width: 24px; height: 24px; background: rgba(0,0,0,0.8); border: 1px solid #FF3B30; border-radius: 50%; color: #FF3B30; display: flex; justify-content: center; align-items: center; font-weight: bold; z-index: 10;}

        /* 24H 管家 - 多会员系统 */
        .client-selector { background: #111; border: 1px solid #333; border-radius: 12px; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;}
        .client-info { display: flex; flex-direction: column; }
        .client-label { font-size: 10px; color: #666; margin-bottom: 4px; letter-spacing: 1px;}
        .client-name { font-size: 16px; color: #fff; font-weight: bold; display: flex; align-items: center; gap: 8px;}
        .client-switch-btn { background: var(--primary); color: #000; padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: bold; border: none;}

        .rings-dash { background: #111; border: 1px solid #222; border-radius: 16px; padding: 20px 15px; display: flex; justify-content: space-around; margin-bottom: 25px;}
        .ring-item { display: flex; flex-direction: column; align-items: center; }
        .svg-ring { width: 70px; height: 70px; transform: rotate(-90deg); margin-bottom: 8px;}
        .svg-bg { fill: none; stroke: #222; stroke-width: 6; }
        .svg-progress { fill: none; stroke: var(--primary); stroke-width: 6; stroke-linecap: round; stroke-dasharray: 176; stroke-dashoffset: 176; transition: 1s; }
        .ring-val { font-size: 12px; font-weight: bold; color: #fff; margin-top: 5px;}

        /* AI 饮食解析卡片 */
        .diet-list { display: flex; flex-direction: column; gap: 15px; }
        .diet-card { background: #111; border-radius: 16px; overflow: hidden; border: 1px solid #222; display: flex; flex-direction: column;}
        .diet-card img { width: 100%; height: 200px; object-fit: cover;}
        .diet-macros { padding: 15px; background: #0A0A0C;}
        .macro-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; border-bottom: 1px solid #222; padding-bottom: 10px;}
        .macro-kcal { font-size: 20px; font-weight: 900; color: var(--primary);}
        .macro-status { padding: 4px 10px; border-radius: 4px; font-size: 10px; font-weight: bold; color: #000;}
        .status-green { background: #32D74B; }
        .status-yellow { background: #FFD60A; }
        .status-red { background: #FF453A; color: #fff;}
        .macro-bars { display: flex; justify-content: space-between;}
        .m-bar { flex: 1; text-align: center; }
        .m-label { font-size: 10px; color: #666; margin-bottom: 4px;}
        .m-val { font-size: 14px; color: #fff; font-weight: bold;}

        /* AI 扫描动画遮罩 */
        .ai-scanning-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; display: none; flex-direction: column; justify-content: center; align-items: center;}
        .scan-box { width: 250px; height: 250px; border: 2px solid var(--primary); position: relative; overflow: hidden; border-radius: 20px; margin-bottom: 20px; background-size: cover; background-position: center;}
        .scan-line { width: 100%; height: 4px; background: var(--primary); box-shadow: 0 0 20px 5px var(--primary); position: absolute; top: 0; animation: scanAnim 1.5s infinite linear;}
        .scan-text { color: var(--primary); font-size: 14px; font-weight: bold; letter-spacing: 2px; font-family: monospace;}
        @keyframes scanAnim { 0% { top: 0; opacity: 1; } 100% { top: 100%; opacity: 0.2; } }

        /* 会员管理弹窗 */
        .client-modal { position: fixed; bottom: -100%; left: 0; width: 100%; background: #111; border-top: 1px solid var(--primary); border-radius: 20px 20px 0 0; padding: 20px; z-index: 5000; transition: 0.4s;}
        .client-modal.show { bottom: 0; }
        .cm-item { padding: 15px; border-bottom: 1px solid #222; font-size: 15px; color: #fff; cursor: pointer; display: flex; justify-content: space-between;}
        .cm-item.active { color: var(--primary); font-weight: bold;}
        .cm-add { padding: 15px; color: #4facfe; text-align: center; font-weight: bold;}
    </style>
</head>
<body>

    <div class="brand-card">
        <h1>SHANGHAI LUXIOU</h1>
        <p style="color:#666; font-size:11px; margin-top:5px; letter-spacing:2px;">数字化私教诊断系统</p>
    </div>

    <div class="btn-group">
        <a href="./step1.html" class="radar-btn btn-a">A 点击进入：智能筛查矩阵</a>
        <a href="./parq.html" class="radar-btn btn-b">B 点击进入：ACE 风险筛查评估</a>
        <a href="./case.html" class="radar-btn btn-c">C 点击进入：VIP 全息体测系统</a>
    </div>

    <div class="grid">
        <div class="card" style="border-color:#a855f7" onclick="window.location.href='./case.html'">
            <img src="case.jpg" loading="lazy">
            <div class="card-info">【档案库】</div>
        </div>
        <div class="card" style="border-color:#eab308" onclick="window.location.href='./plan.html'">
            <img src="plan.jpg" loading="lazy"><div class="card-info">【高定方案库】</div>
        </div>
        
        <div class="card" style="border-color:#22d3ee" onclick="openModal('endorseModal')">
            <img src="cert.jpg" loading="lazy"><div class="card-info">【背书库】</div>
        </div>
        <div class="card" style="border-color:#f472b6" onclick="window.location.href='./price.html'">
            <img src="product.jpg" loading="lazy"><div class="card-info">【黑金报价库】</div>
        </div>

        <div class="card" style="border-color:#10b981; grid-column: 1 / -1;" onclick="openModal('lifestyleModal')">
            <img src="case.jpg" loading="lazy" style="filter: brightness(0.4);">
            <div class="card-info" style="font-size: 14px; letter-spacing: 2px; padding: 15px 5px;">【24H 全息节律管家】</div>
        </div>
    </div>

    <div id="endorseModal" class="modal-base">
        <div class="m-header">
            <div class="m-title">品牌背书库</div>
            <button class="m-close" onclick="closeModal('endorseModal')">×</button>
        </div>
        <div class="e-seg">
            <div class="e-tab active" onclick="switchTab('cert', this)">资质证书</div>
            <div class="e-tab" onclick="switchTab('coach', this)">教练团队墙</div>
        </div>
        <div class="m-body" style="padding-top:0;">
            <div id="view-cert" class="e-sec active">
                <div class="upload-btn" onclick="document.getElementById('cert-up').click()">+ 上传证书 (支持多选)</div>
                <input type="file" id="cert-up" multiple accept="image/*" style="display:none;" onchange="handleImageUp(event, 'cert')">
                <div class="e-grid" id="cert-gallery"></div>
            </div>
            <div id="view-coach" class="e-sec">
                <div class="upload-btn" onclick="document.getElementById('coach-up').click()">+ 上传教练照片 (支持多选)</div>
                <input type="file" id="coach-up" multiple accept="image/*" style="display:none;" onchange="handleImageUp(event, 'coach')">
                <div class="e-grid" id="coach-gallery"></div>
            </div>
        </div>
    </div>

    <div id="lifestyleModal" class="modal-base">
        <div class="m-header">
            <div class="m-title" style="color:#10b981;">24H 全息节律管家</div>
            <button class="m-close" onclick="closeModal('lifestyleModal')">×</button>
        </div>
        
        <div class="m-body">
            <div class="client-selector" onclick="openClientMenu()">
                <div class="client-info">
                    <div class="client-label">当前管理服务对象</div>
                    <div class="client-name" id="current-client-name">VIP 默认档案</div>
                </div>
                <button class="client-switch-btn">切换会员</button>
            </div>

            <div class="rings-dash">
                <div class="ring-item" onclick="updateRing('water', 250)">
                    <svg class="svg-ring"><circle class="svg-bg" cx="35" cy="35" r="28"/><circle class="svg-progress" id="ring-water" cx="35" cy="35" r="28"/></svg>
                    <div style="font-size:10px; color:#aaa;">饮水(ml)</div>
                    <div class="ring-val" id="val-water">0</div>
                </div>
                <div class="ring-item" onclick="updateRing('cardio', 20)">
                    <svg class="svg-ring"><circle class="svg-bg" cx="35" cy="35" r="28"/><circle class="svg-progress" id="ring-cardio" cx="35" cy="35" r="28"/></svg>
                    <div style="font-size:10px; color:#aaa;">有氧(%)</div>
                    <div class="ring-val" id="val-cardio">0</div>
                </div>
                <div class="ring-item" onclick="updateRing('train', 1)">
                    <svg class="svg-ring"><circle class="svg-bg" cx="35" cy="35" r="28"/><circle class="svg-progress" id="ring-train" cx="35" cy="35" r="28"/></svg>
                    <div style="font-size:10px; color:#aaa;">训练(次)</div>
                    <div class="ring-val" id="val-train">0</div>
                </div>
            </div>

            <div class="upload-btn" style="border-color:#10b981; color:#10b981;" onclick="document.getElementById('diet-up').click()">
                + 唤醒 AI 饮食视觉分析 (上传照片)
            </div>
            <input type="file" id="diet-up" accept="image/*" style="display:none;" onchange="processAIFoodScan(event)">

            <div class="diet-list" id="diet-list-container"></div>
        </div>
    </div>

    <div class="client-modal" id="clientMenu">
        <div style="color:#aaa; font-size:12px; margin-bottom:15px; padding-left:15px;">我的会员列表</div>
        <div id="client-list-render"></div>
        <div class="cm-add" onclick="addNewClient()">+ 新建 VIP 会员档案</div>
        <div style="text-align:center; padding:15px; margin-top:10px; color:#666;" onclick="document.getElementById('clientMenu').classList.remove('show')">取消</div>
    </div>

    <div class="ai-scanning-overlay" id="aiOverlay">
        <div class="scan-box" id="scanBoxImage">
            <div class="scan-line"></div>
        </div>
        <div class="scan-text" id="scanText">CONNECTING VISION MODEL...</div>
    </div>

    <script>
        // ================= 数据库与架构 =================
        let idb = null;
        let globalData = { cert: [], coach: [] }; 
        
        // 核心：多会员数据结构
        let clients = {}; 
        let currentClientId = 'default';

        window.onload = function() {
            const request = window.indexedDB.open("LuxiouSuperDB", 3);
            request.onupgradeneeded = function(e) {
                idb = e.target.result;
                if (!idb.objectStoreNames.contains("sysStore")) {
                    idb.createObjectStore("sysStore");
                }
            };
            request.onsuccess = function(e) {
                idb = e.target.result;
                initSystemData(); 
            };
        }

        function initSystemData() {
            const tx = idb.transaction("sysStore", "readonly");
            const store = tx.objectStore("sysStore");
            
            // 加载背书库
            store.get("endorse").onsuccess = e => {
                if(e.target.result) globalData = e.target.result;
                renderGallery('cert'); renderGallery('coach');
            };

            // 加载会员库
            store.get("clients").onsuccess = e => {
                if(e.target.result) {
                    clients = e.target.result;
                } else {
                    // 初始化第一个默认会员
                    clients['default'] = {
                        id: 'default',
                        name: 'VIP 默认档案',
                        rings: { water: 0, cardio: 0, train: 0 },
                        diet: []
                    };
                }
                refreshClientUI();
            };
        }

        function saveDB(key, data) {
            if(!idb) return;
            const tx = idb.transaction("sysStore", "readwrite");
            tx.objectStore("sysStore").put(data, key);
        }

        function openModal(id) { document.getElementById(id).classList.add('show'); }
        function closeModal(id) { document.getElementById(id).classList.remove('show'); }
        function switchTab(type, btn) {
            document.querySelectorAll('.e-tab').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.e-sec').forEach(sec => sec.classList.remove('active'));
            document.getElementById('view-' + type).classList.add('active');
        }

        // ================= 背书库上传与渲染 =================
        function handleImageUp(event, type) {
            const files = Array.from(event.target.files);
            if(files.length === 0) return;
            let loaded = 0; let temp = [];
            files.forEach((file, idx) => {
                const r = new FileReader();
                r.onload = e => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const scale = Math.min(600 / img.width, 1);
                        canvas.width = img.width * scale; canvas.height = img.height * scale;
                        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                        temp.push({ i: idx, data: canvas.toDataURL('image/jpeg', 0.6) });
                        loaded++;
                        if(loaded === files.length) {
                            temp.sort((a,b) => a.i - b.i);
                            globalData[type] = temp.map(t => t.data).concat(globalData[type]);
                            saveDB("endorse", globalData);
                            renderGallery(type);
                            event.target.value = '';
                        }
                    };
                    img.src = e.target.result;
                };
                r.readAsDataURL(file);
            });
        }

        function renderGallery(type) {
            const box = document.getElementById(`${type}-gallery`);
            box.innerHTML = '';
            globalData[type].forEach((b64, i) => {
                box.innerHTML += `<div class="e-item"><div class="del" onclick="delImg('${type}', ${i}, event)">×</div><img src="${b64}"></div>`;
            });
            new Sortable(box, { animation: 150, delay: 200, delayOnTouchOnly: true, filter: ".del", onEnd: e => {
                const arr = globalData[type];
                arr.splice(e.newIndex, 0, arr.splice(e.oldIndex, 1)[0]);
                saveDB("endorse", globalData);
            }});
        }

        function delImg(type, index, e) {
            e.stopPropagation();
            if(confirm('删除照片？')) {
                globalData[type].splice(index, 1);
                saveDB("endorse", globalData);
                renderGallery(type);
            }
        }

        // ================= 24H 管家：多会员逻辑 =================
        function openClientMenu() {
            let html = '';
            for(let key in clients) {
                let active = key === currentClientId ? 'active' : '';
                let check = key === currentClientId ? '✓' : '';
                html += `<div class="cm-item ${active}" onclick="switchClient('${key}')"><span>${clients[key].name}</span><span>${check}</span></div>`;
            }
            document.getElementById('client-list-render').innerHTML = html;
            document.getElementById('clientMenu').classList.add('show');
        }

        function switchClient(id) {
            currentClientId = id;
            document.getElementById('clientMenu').classList.remove('show');
            refreshClientUI();
        }

        function addNewClient() {
            let name = prompt("请输入新会员名字 (如：张总)");
            if(!name) return;
            let newId = 'c_' + Date.now();
            clients[newId] = { id: newId, name: name, rings: { water: 0, cardio: 0, train: 0 }, diet: [] };
            saveDB("clients", clients);
            switchClient(newId);
        }

        function refreshClientUI() {
            let c = clients[currentClientId];
            document.getElementById('current-client-name').innerText = c.name;
            
            // 刷新圆环
            renderRing('water', c.rings.water, 2000);
            renderRing('cardio', c.rings.cardio, 100);
            renderRing('train', c.rings.train, 3);
            
            // 刷新饮食瀑布流
            renderDietList();
        }

        function updateRing(type, step) {
            let c = clients[currentClientId];
            let max = type === 'water' ? 2000 : (type === 'cardio' ? 100 : 3);
            c.rings[type] += step;
            if(c.rings[type] > max) c.rings[type] = 0;
            saveDB("clients", clients);
            renderRing(type, c.rings[type], max);
        }

        function renderRing(type, val, max) {
            document.getElementById(`val-${type}`).innerText = val;
            let percent = val / max;
            document.getElementById(`ring-${type}`).style.strokeDashoffset = 176 - (176 * percent);
        }

        // ================= AI 视觉解析模拟引擎 =================
        function processAIFoodScan(event) {
            const file = event.target.files[0];
            if(!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const base64 = e.target.result;
                // 1. 弹出震撼的AI扫描层
                const overlay = document.getElementById('aiOverlay');
                const text = document.getElementById('scanText');
                document.getElementById('scanBoxImage').style.backgroundImage = `url(${base64})`;
                overlay.style.display = 'flex';
                
                // 2. 模拟计算过程文字变化
                text.innerText = "VISION MODEL CONNECTED...";
                setTimeout(() => text.innerText = "EXTRACTING MACROS...", 800);
                setTimeout(() => text.innerText = "CALCULATING CALORIES...", 1600);
                
                // 3. 2.5秒后出结果
                setTimeout(() => {
                    overlay.style.display = 'none';
                    
                    // 随机生成合理的饮食数据
                    const isHealthy = Math.random() > 0.4;
                    const kcal = Math.floor(Math.random() * 400) + 150;
                    const pro = Math.floor(Math.random() * 30) + 5;
                    const carb = Math.floor(Math.random() * 50) + 10;
                    const fat = Math.floor(Math.random() * 20) + 5;
                    
                    let status = 'green'; let sText = '极佳';
                    if(!isHealthy && kcal > 400) { status = 'red'; sText = '警报'; }
                    else if(!isHealthy) { status = 'yellow'; sText = '注意'; }

                    // 保存到当前会员档案
                    let now = new Date();
                    let tStr = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
                    
                    // 压缩原图存入
                    compressImage(base64, (compressedB64) => {
                        clients[currentClientId].diet.unshift({
                            img: compressedB64, time: tStr, 
                            kcal: kcal, pro: pro, carb: carb, fat: fat, 
                            status: status, sText: sText
                        });
                        saveDB("clients", clients);
                        renderDietList();
                    });
                }, 2500);
            };
            reader.readAsDataURL(file);
        }

        function compressImage(b64, callback) {
            const img = new Image();
            img.onload = () => {
                const can = document.createElement('canvas');
                const sc = Math.min(600 / img.width, 1);
                can.width = img.width * sc; can.height = img.height * sc;
                can.getContext('2d').drawImage(img, 0, 0, can.width, can.height);
                callback(can.toDataURL('image/jpeg', 0.6));
            };
            img.src = b64;
        }

        function renderDietList() {
            const box = document.getElementById('diet-list-container');
            const arr = clients[currentClientId].diet;
            box.innerHTML = '';
            if(arr.length === 0) {
                box.innerHTML = '<div style="text-align:center; padding:30px; color:#555; border:1px dashed #333; border-radius:12px; font-size:12px;">今日暂无饮食打卡<br>系统等待接收视觉数据...</div>';
                return;
            }

            arr.forEach((item, i) => {
                box.innerHTML += `
                    <div class="diet-card">
                        <img src="${item.img}">
                        <div class="diet-macros">
                            <div class="macro-header">
                                <div>
                                    <div style="font-size:10px; color:#aaa; margin-bottom:2px;">AI估算热量 (${item.time})</div>
                                    <div class="macro-kcal">${item.kcal} KCAL</div>
                                </div>
                                <div class="macro-status status-${item.status}">${item.sText}</div>
                            </div>
                            <div class="macro-bars">
                                <div class="m-bar"><div class="m-label">蛋白质(Pro)</div><div class="m-val">${item.pro}g</div></div>
                                <div class="m-bar" style="border-left:1px solid #333; border-right:1px solid #333;"><div class="m-label">碳水(Carb)</div><div class="m-val">${item.carb}g</div></div>
                                <div class="m-bar"><div class="m-label">脂肪(Fat)</div><div class="m-val">${item.fat}g</div></div>
                            </div>
                        </div>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
