<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LUXIOU | ACE 医疗级风险排查</title>
    <meta name="referrer" content="no-referrer">
    <style>
        :root {
            --primary: #D4AF37;
            --warn: #FF8C00;
            --danger: #B22222;
            --bg: #050505;
            --surface: #121212;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            outline: none;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: #e2e8f0;
            font-family: "DIN Alternate", "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif;
            overflow-y: auto;
            -webkit-font-smoothing: antialiased;
        }

        #capture-area {
            background: var(--bg);
            width: 100%;
            min-height: 100vh;
            padding-bottom: 120px;
            display: block;
        }

        .header-brand {
            width: 100%;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(5, 5, 5, 0.95);
            border-bottom: 1px solid rgba(178, 34, 34, 0.3);
            position: relative;
        }

        .brand-text {
            font-size: 18px;
            font-weight: 900;
            color: #fff;
            letter-spacing: 2px;
        }

        .step-badge {
            position: absolute;
            right: 15px;
            background: rgba(178, 34, 34, 0.1);
            border: 1px solid var(--danger);
            color: var(--danger);
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 12px;
            font-weight: bold;
        }

        .radar-section {
            width: 100%;
            height: 260px;
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle at center, rgba(18, 18, 18, 0.8) 0%, var(--bg) 100%);
            border-bottom: 1px solid rgba(255,255,255,0.03);
            padding-top: 15px;
        }

        .score-board {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 0 20px;
            z-index: 2;
            gap: 12px;
        }

        .score-info {
            display: flex;
            flex-direction: column;
        }

        .risk-label {
            font-size: 11px;
            color: #888;
            font-weight: 900;
            letter-spacing: 1px;
        }

        .risk-score {
            font-size: 32px;
            font-weight: 900;
            color: var(--primary);
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            line-height: 1;
            margin: 6px 0;
            transition: color 0.3s;
        }

        .risk-score.mod {
            color: var(--warn);
        }

        .risk-score.high {
            color: var(--danger);
        }

        .slogan-box {
            font-size: 11px;
            font-weight: bold;
            padding: 6px 10px;
            border-radius: 6px;
            background: rgba(212, 175, 55, 0.05);
            color: var(--primary);
            border: 1px solid rgba(212, 175, 55, 0.2);
            max-width: 170px;
            line-height: 1.4;
            transition: 0.3s;
        }

        .slogan-box.warn {
            background: rgba(255, 140, 0, 0.05);
            color: var(--warn);
            border-color: rgba(255, 140, 0, 0.3);
        }

        .slogan-box.crit {
            background: rgba(178, 34, 34, 0.05);
            color: var(--danger);
            border-color: rgba(178, 34, 34, 0.3);
        }

        .radar-container {
            position: relative;
            width: 100%;
            height: 180px;
            margin-top: 5px;
        }

        #parqRadar {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .q-list {
            padding: 10px 15px;
        }

        .cat-title {
            font-size: 13px;
            font-weight: 900;
            color: var(--primary);
            margin: 20px 0 12px 0;
            border-left: 3px solid var(--primary);
            padding-left: 8px;
        }

        .q-item {
            background: var(--surface);
            border: 1px solid rgba(255,255,255,0.03);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .q-text {
            font-size: 13px;
            color: #D1D5DB;
            line-height: 1.6;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .ans-group {
            display: flex;
            gap: 10px;
        }

        .ans-btn {
            flex: 1;
            padding: 12px;
            text-align: center;
            border-radius: 8px;
            font-size: 13px;
            font-weight: bold;
            color: #888;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            transition: 0.2s;
            cursor: pointer;
            user-select: none;
        }

        .ans-btn.no.active {
            background: rgba(212, 175, 55, 0.08);
            border-color: var(--primary);
            color: var(--primary);
        }

        .ans-btn.yes.active {
            background: rgba(178, 34, 34, 0.1);
            border-color: var(--danger);
            color: var(--danger);
        }

        .signature-section {
            margin-top: 30px;
            padding: 20px 15px;
            background: var(--surface);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .sig-header {
            font-size: 12px;
            font-weight: bold;
            color: #888;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .contract-line {
            width: 100%;
            border-bottom: 1px solid #444;
            position: relative;
            height: 60px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 5px;
            cursor: pointer;
        }

        .pulse-text {
            color: var(--danger);
            font-size: 16px;
            font-weight: bold;
            animation: pulse 2s infinite;
        }

        #sigResultImg {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            height: 80px;
            display: none;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        .bottom-action {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 15px 20px 25px 20px;
            background: linear-gradient(to top, rgba(5,5,5,1) 60%, rgba(5,5,5,0));
            z-index: 10;
        }

        .btn-generate {
            width: 100%;
            background: linear-gradient(135deg, #D4AF37, #AA8A2A);
            color: #000;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 900;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .btn-generate:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .sig-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: #fff;
            z-index: 9999999;
            flex-direction: column;
            overflow: hidden;
            overscroll-behavior: none;
        }

        .sig-modal-header {
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            color: #000;
            font-weight: 900;
            font-size: 16px;
            border-bottom: 1px solid #ddd;
            background: #f8f9fa;
        }

        .btn-close-sig {
            font-size: 24px;
            color: #888;
            background: none;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        #fullscreenSigCanvas {
            flex: 1;
            width: 100%;
            touch-action: none;
            background: #fff;
            display: block;
        }

        .sig-modal-footer {
            height: 90px;
            display: flex;
            gap: 15px;
            padding: 20px;
            background: #f8f9fa;
            border-top: 1px solid #eee;
        }

        .sig-btn {
            flex: 1;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            cursor: pointer;
        }

        .sig-btn.cancel {
            background: #e2e8f0;
            color: #475569;
        }

        .sig-btn.confirm {
            background: #000;
            color: #fff;
        }

        .poster-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 99999999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .poster-scroll-area {
            max-height: 70vh;
            width: 100%;
            overflow-y: auto;
            border-radius: 12px;
            border: 1px solid var(--danger);
        }

        .poster-scroll-area::-webkit-scrollbar {
            display: none;
        }

        .poster-img {
            width: 100%;
            display: block;
        }

        .poster-tip {
            color: #888;
            font-size: 13px;
            margin: 20px 0 15px 0;
            font-weight: bold;
            text-align: center;
        }

        .btn-next {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 14px 35px;
            border-radius: 30px;
            font-weight: 900;
            font-size: 15px;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .brand-text {
                font-size: 16px;
            }

            .step-badge {
                right: 10px;
                font-size: 9px;
                padding: 4px 6px;
            }

            .score-board {
                padding: 0 15px;
            }

            .risk-score {
                font-size: 28px;
            }

            .slogan-box {
                max-width: 150px;
                font-size: 10px;
            }
        }
    </style>
</head>
<body>
    <div id="capture-area">
        <div class="header-brand">
            <div class="brand-text">ACE 医疗级风险排查</div>
            <div class="step-badge">核心准入档案</div>
        </div>

        <div class="radar-section">
            <div class="score-board">
                <div class="score-info">
                    <span class="risk-label">身体风险状态评估</span>
                    <span class="risk-score" id="riskDisplay">安全 (LOW)</span>
                </div>
                <div class="slogan-box" id="sloganBox">体征良好，具备各强度训练准入条件。</div>
            </div>
            <div class="radar-container">
                <canvas id="parqRadar"></canvas>
            </div>
        </div>

        <div class="q-list" id="scrollArea">
            <div id="questionContainer"></div>

            <div class="signature-section">
                <div class="sig-header">Medical Release / 医疗免责同意书签字</div>
                <div class="contract-line" onclick="openSigPad()">
                    <span id="sigPlaceholder" class="pulse-text">点击全屏手写签字</span>
                    <img id="sigResultImg" src="" alt="签字结果">
                </div>
            </div>
        </div>
    </div>

    <div class="sig-modal" id="sigModal">
        <div class="sig-modal-header">
            <span>请在此确认您已如实填写</span>
            <button class="btn-close-sig" onclick="closeSigPad()">×</button>
        </div>
        <canvas id="fullscreenSigCanvas"></canvas>
        <div class="sig-modal-footer">
            <button class="sig-btn cancel" onclick="clearSig()">清除重写</button>
            <button class="sig-btn confirm" onclick="saveSig()">确认签发</button>
        </div>
    </div>

    <div class="bottom-action" id="actionBtnGroup">
        <button class="btn-generate" id="generateBtn" onclick="generatePoster()">
            <span style="font-size: 20px;">🛡️</span> 生成医疗排查底档并保存
        </button>
    </div>

    <div class="poster-overlay" id="posterOverlay">
        <div class="poster-scroll-area">
            <img id="posterImg" class="poster-img" src="" alt="PAR-Q 海报">
        </div>
        <div class="poster-tip">
            <span style="color:var(--primary)">👇 长按上方图片，保存带签名的安全承诺</span>
        </div>
        <button class="btn-next" onclick="goToNextStep()">进入案例展示 ➔</button>
    </div>

    <script>
        const questionData = [
            {
                title: "一、心血管与呼吸系统征兆",
                qs: [
                    { text: "1. 医生是否曾诊断您患有心脏病，或建议只能在医疗监督下运动？", impact: { cardio: -15 } },
                    { text: "2. 在休息、日常活动或轻微运动时，您是否会感到胸痛或胸闷？", impact: { cardio: -15 } },
                    { text: "3. 过去半年内，是否有过不明原因的头晕、晕厥或失去平衡？", impact: { cardio: -10, general: -5 } },
                    { text: "4. 直系亲属是否有过心脏病发作或猝死史？", impact: { cardio: -10 } },
                    { text: "5. 您是否患有哮喘、慢阻肺等呼吸系统疾病？", impact: { resp: -15 } },
                    { text: "6. 稍微活动一下是否就会感到异常的呼吸急促？", impact: { resp: -10, cardio: -5 } }
                ]
            },
            {
                title: "二、代谢与慢性病史",
                qs: [
                    { text: "7. 您是否有高血压病史，或目前正在服用降压药物？", impact: { meta: -15, cardio: -5 } },
                    { text: "8. 您是否有糖尿病，或曾被告知空腹血糖偏高？", impact: { meta: -15 } },
                    { text: "9. 您是否患有严重高血脂（胆固醇指标异常）？", impact: { meta: -10 } },
                    { text: "10. 您目前是否吸烟，或戒烟时间不足6个月？", impact: { resp: -10, cardio: -5 } },
                    { text: "11. 您的脚踝或小腿是否经常出现不明原因的水肿？", impact: { meta: -10, cardio: -10 } }
                ]
            },
            {
                title: "三、骨骼关节与外伤史",
                qs: [
                    { text: "12. 您的脊柱、关节或骨骼是否有已被医生确诊的损伤？", impact: { ortho: -15 } },
                    { text: "13. 您的关节是否患有风湿或骨关节炎？", impact: { ortho: -15 } },
                    { text: "14. 近期半年内是否接受过任何外科手术尚在恢复期？", impact: { ortho: -10, general: -10 } }
                ]
            },
            {
                title: "四、生活方式与综合指征",
                qs: [
                    { text: "15. 心脏是否经常出现不明原因的剧烈跳动或心悸？", impact: { cardio: -15 } },
                    { text: "16. 您是否长期极度久坐（每周运动少于3次）？", impact: { general: -10 } },
                    { text: "17. 是否被医生告知过存在严重的肥胖相关风险？", impact: { meta: -15, ortho: -10 } },
                    { text: "18. 是否有其他任何疾病，医生建议您运动前必须咨询专业意见？", impact: { general: -15 } }
                ]
            }
        ];

        const container = document.getElementById('questionContainer');

        questionData.forEach(group => {
            let html = `<div class="cat-title">${group.title}</div>`;
            group.qs.forEach(q => {
                const impactStr = JSON.stringify(q.impact);
                html += `
                    <div class="q-item">
                        <div class="q-text">${q.text}</div>
                        <div class="ans-group">
                            <div class="ans-btn yes" data-impact='${impactStr}' onclick="selectAns(this, true)">是的 (YES)</div>
                            <div class="ans-btn no active" onclick="selectAns(this, false)">没有 (NO)</div>
                        </div>
                    </div>
                `;
            });
            container.innerHTML += html;
        });

        const canvas = document.getElementById('parqRadar');
        const ctx = canvas.getContext('2d');
        const labels = ["心血管系统", "骨骼与关节", "代谢状态", "呼吸系统", "综合指征"];
        const maxScore = 100;

        let curScores = { cardio: 100, ortho: 100, meta: 100, resp: 100, general: 100 };
        let tgtScores = { cardio: 100, ortho: 100, meta: 100, resp: 100, general: 100 };

        function drawRadar() {
            if (!canvas || !canvas.parentElement) return;

            const rect = canvas.parentElement.getBoundingClientRect();
            if (rect.width === 0 || rect.height === 0) return;

            const dpr = window.devicePixelRatio || 1;
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;

            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.scale(dpr, dpr);

            const w = rect.width;
            const h = rect.height;
            const centerX = w / 2;
            const centerY = h / 2 + 5;
            const radius = Math.min(w, h) / 2 * 0.75;
            const sides = 5;

            ctx.clearRect(0, 0, w, h);
            ctx.lineWidth = 1;

            for (let level = 1; level <= 4; level++) {
                ctx.beginPath();
                for (let i = 0; i < sides; i++) {
                    const angle = (Math.PI * 2 * i) / sides - Math.PI / 2;
                    const x = centerX + radius * (level / 4) * Math.cos(angle);
                    const y = centerY + radius * (level / 4) * Math.sin(angle);
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.strokeStyle = `rgba(212, 175, 55, ${0.1 * level})`;
                ctx.stroke();
            }

            ctx.fillStyle = "#888";
            ctx.font = "bold 11px sans-serif";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";

            for (let i = 0; i < sides; i++) {
                const angle = (Math.PI * 2 * i) / sides - Math.PI / 2;
                const x = centerX + radius * Math.cos(angle);
                const y = centerY + radius * Math.sin(angle);

                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.lineTo(x, y);
                ctx.strokeStyle = "rgba(255,255,255,0.03)";
                ctx.stroke();

                const labelX = centerX + (radius + 28) * Math.cos(angle);
                const labelY = centerY + (radius + 15) * Math.sin(angle);
                ctx.fillText(labels[i], labelX, labelY);
            }

            ctx.beginPath();
            const keys = ['cardio', 'ortho', 'meta', 'resp', 'general'];

            keys.forEach((key, i) => {
                const angle = (Math.PI * 2 * i) / sides - Math.PI / 2;
                const val = Math.max(10, Math.min(100, curScores[key]));
                const x = centerX + radius * (val / maxScore) * Math.cos(angle);
                const y = centerY + radius * (val / maxScore) * Math.sin(angle);
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            });

            ctx.closePath();

            const totalScore = Math.round(Object.values(curScores).reduce((a, b) => a + b, 0) / 5);

            ctx.lineWidth = 2;
            if (totalScore >= 90) {
                ctx.fillStyle = "rgba(212, 175, 55, 0.4)";
                ctx.strokeStyle = "#D4AF37";
            } else if (totalScore >= 75) {
                ctx.fillStyle = "rgba(255, 140, 0, 0.4)";
                ctx.strokeStyle = "#FF8C00";
            } else {
                ctx.fillStyle = "rgba(178, 34, 34, 0.4)";
                ctx.strokeStyle = "#B22222";
            }

            ctx.fill();
            ctx.stroke();
        }

        function animate() {
            let needsUpdate = false;
            const keys = ['cardio', 'ortho', 'meta', 'resp', 'general'];

            keys.forEach(key => {
                const diff = tgtScores[key] - curScores[key];
                if (Math.abs(diff) > 0.5) {
                    curScores[key] += diff * 0.2;
                    needsUpdate = true;
                } else {
                    curScores[key] = tgtScores[key];
                }
            });

            if (needsUpdate) {
                drawRadar();
                updateRiskLabel();
            }

            requestAnimationFrame(animate);
        }

        function updateRiskLabel() {
            const curSum = Object.values(curScores).reduce((a, b) => a + b, 0);
            const avgScore = Math.round(curSum / 5);

            const display = document.getElementById('riskDisplay');
            const slogan = document.getElementById('sloganBox');

            if (avgScore >= 90) {
                display.innerText = "安全 (LOW)";
                display.className = "risk-score";
                slogan.className = "slogan-box";
                slogan.innerText = "体征良好，具备各强度训练准入条件。";
            } else if (avgScore >= 75) {
                display.innerText = "关注 (MOD)";
                display.className = "risk-score mod";
                slogan.className = "slogan-box warn";
                slogan.innerText = "存在基础风险项，建议开启轻中度定制康复。";
            } else {
                display.innerText = "预警 (HIGH)";
                display.className = "risk-score high";
                slogan.className = "slogan-box crit";
                slogan.innerText = "存在特异性体征，需匹配专业医疗级康复干预及严密监测。";
            }
        }

        function selectAns(btn, isYes) {
            const siblings = btn.parentElement.children;
            for (let i = 0; i < siblings.length; i++) {
                siblings[i].classList.remove('active');
            }
            btn.classList.add('active');
            recalcParqScores();
        }

        function recalcParqScores() {
            const newS = { cardio: 100, ortho: 100, meta: 100, resp: 100, general: 100 };

            document.querySelectorAll('.ans-btn.yes.active').forEach(btn => {
                try {
                    const impact = JSON.parse(btn.getAttribute('data-impact'));
                    for (const key in impact) {
                        newS[key] += impact[key];
                    }
                } catch (e) {}
            });

            for (const key in newS) {
                newS[key] = Math.max(10, Math.min(100, newS[key]));
            }

            tgtScores = newS;
            updateRiskLabel();
            drawRadar();
        }

        const fSigCanvas = document.getElementById('fullscreenSigCanvas');
        const fSigCtx = fSigCanvas.getContext('2d');
        let fIsDrawing = false;

        function openSigPad() {
            document.body.style.overflow = 'hidden';
            const modal = document.getElementById('sigModal');
            modal.style.display = 'flex';

            const dpr = window.devicePixelRatio || 1;
            const width = fSigCanvas.clientWidth;
            const height = fSigCanvas.clientHeight;

            fSigCanvas.width = width * dpr;
            fSigCanvas.height = height * dpr;

            fSigCtx.setTransform(1, 0, 0, 1, 0, 0);
            fSigCtx.scale(dpr, dpr);

            fSigCtx.fillStyle = "#ffffff";
            fSigCtx.fillRect(0, 0, width, height);
            fSigCtx.lineWidth = 5;
            fSigCtx.lineCap = 'round';
            fSigCtx.strokeStyle = '#000000';
        }

        function closeSigPad() {
            document.body.style.overflow = 'auto';
            document.getElementById('sigModal').style.display = 'none';
        }

        function getFPos(e) {
            const rect = fSigCanvas.getBoundingClientRect();
            const point = e.touches ? e.touches[0] : e;
            return {
                x: point.clientX - rect.left,
                y: point.clientY - rect.top
            };
        }

        fSigCanvas.addEventListener('mousedown', e => {
            fIsDrawing = true;
            const p = getFPos(e);
            fSigCtx.beginPath();
            fSigCtx.moveTo(p.x, p.y);
        });

        fSigCanvas.addEventListener('mousemove', e => {
            if (!fIsDrawing) return;
            const p = getFPos(e);
            fSigCtx.lineTo(p.x, p.y);
            fSigCtx.stroke();
        });

        fSigCanvas.addEventListener('mouseup', () => fIsDrawing = false);
        fSigCanvas.addEventListener('mouseleave', () => fIsDrawing = false);

        fSigCanvas.addEventListener('touchstart', e => {
            e.preventDefault();
            fIsDrawing = true;
            const p = getFPos(e);
            fSigCtx.beginPath();
            fSigCtx.moveTo(p.x, p.y);
        }, { passive: false });

        fSigCanvas.addEventListener('touchmove', e => {
            e.preventDefault();
            if (!fIsDrawing) return;
            const p = getFPos(e);
            fSigCtx.lineTo(p.x, p.y);
            fSigCtx.stroke();
        }, { passive: false });

        fSigCanvas.addEventListener('touchend', e => {
            e.preventDefault();
            fIsDrawing = false;
        }, { passive: false });

        function clearSig() {
            const width = fSigCanvas.clientWidth;
            const height = fSigCanvas.clientHeight;
            fSigCtx.fillStyle = "#ffffff";
            fSigCtx.fillRect(0, 0, width, height);
        }

        function saveSig() {
            const dataUrl = fSigCanvas.toDataURL("image/png");
            document.getElementById('sigResultImg').src = dataUrl;
            document.getElementById('sigResultImg').style.display = 'block';
            document.getElementById('sigPlaceholder').style.display = 'none';
            closeSigPad();
        }

        function loadHtml2CanvasScript() {
            return new Promise((resolve, reject) => {
                if (window.html2canvas) {
                    resolve();
                    return;
                }

                const script = document.createElement('script');
                script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
                script.async = true;
                script.onload = resolve;
                script.onerror = reject;
                document.body.appendChild(script);
            });
        }

        function generatePoster() {
            if (document.getElementById('sigPlaceholder').style.display !== 'none') {
                alert("请先完成全屏电子签字，再生成免责底档！");
                return;
            }

            if (navigator.vibrate) navigator.vibrate(50);

            const btn = document.getElementById('generateBtn');
            const actionBtnGroup = document.getElementById('actionBtnGroup');
            const captureArea = document.getElementById('capture-area');

            btn.disabled = true;
            btn.innerHTML = "⏳ 正在生成...";
            btn.style.opacity = "0.7";
            actionBtnGroup.style.display = 'none';

            loadHtml2CanvasScript().then(() => {
                return window.html2canvas(captureArea, {
                    backgroundColor: "#050505",
                    scale: 2,
                    useCORS: true
                });
            }).then(resultCanvas => {
                actionBtnGroup.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = "<span style='font-size: 20px;'>🛡️</span> 生成医疗排查底档并保存";
                btn.style.opacity = "1";

                document.getElementById('posterImg').src = resultCanvas.toDataURL("image/jpeg", 0.9);
                document.getElementById('posterOverlay').style.display = 'flex';
            }).catch(() => {
                actionBtnGroup.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = "<span style='font-size: 20px;'>🛡️</span> 生成医疗排查底档并保存";
                btn.style.opacity = "1";
                alert("生成档案失败，请重试！");
            });
        }

        function goToNextStep() {
            window.location.href = 'case.html';
        }

        window.onload = function () {
            setTimeout(() => {
                drawRadar();
                updateRiskLabel();
                animate();
            }, 100);

            window.addEventListener('resize', () => {
                drawRadar();
                updateRiskLabel();
            });
        };
    </script>
</body>
</html>
