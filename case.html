<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LUXIOU | 全息数字化诊断 V16.0</title>
    <meta name="referrer" content="no-referrer">
    <style>
        :root {
            --primary: #00f2fe;
            --accent: #00ff88;
            --danger: #ff4757;
            --bg: #0b0f19;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }

        html, body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: #e2e8f0;
            font-family: "DIN Alternate", -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            height: 100%;
        }

        body {
            display: flex;
            flex-direction: column;
            min-height: 100svh;
            overflow: hidden;
        }

        .header-brand {
            flex: 0 0 55px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(11, 15, 25, 0.98);
            z-index: 50;
            border-bottom: 1px solid rgba(0, 242, 254, 0.3);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            position: relative;
        }

        .brand-text {
            font-size: 20px;
            font-weight: 900;
            color: #fff;
            letter-spacing: 3px;
            text-shadow: 0 0 12px rgba(0, 242, 254, 0.8);
        }

        .back-btn {
            position: absolute;
            left: 15px;
            color: #fff;
            text-decoration: none;
            font-size: 13px;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 5px 14px;
            border-radius: 20px;
            font-weight: 600;
        }

        .app-content {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            padding: 12px;
            overflow: hidden;
        }

        .category-box {
            flex: 0 0 auto;
            display: flex;
            gap: 10px;
            overflow-x: auto;
            margin-bottom: 12px;
            padding-bottom: 4px;
            scrollbar-width: none;
        }

        .category-box::-webkit-scrollbar {
            display: none;
        }

        .cat-item {
            flex: 0 0 auto;
            padding: 8px 18px;
            background: rgba(30, 41, 59, 0.6);
            border-radius: 20px;
            font-size: 13px;
            color: #94a3b8;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.25s ease;
        }

        .cat-item.active {
            background: var(--primary);
            color: #0b0f19;
            border: none;
            box-shadow: 0 0 16px rgba(0, 242, 254, 0.5);
            font-weight: 900;
            transform: scale(1.03);
        }

        .stage-area {
            flex: 1;
            min-height: 0;
            display: flex;
            gap: 6px;
            margin-bottom: 12px;
            overflow: hidden;
        }

        .params-side {
            flex: 0 0 92px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .param-card {
            flex: 1;
            background: rgba(11, 15, 25, 0.8);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding: 5px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            min-height: 0;
        }

        .card-l {
            border-left: 3px solid #fff;
            border-radius: 8px 0 0 8px;
            align-items: flex-start;
        }

        .card-r {
            border-right: 3px solid var(--primary);
            border-radius: 0 8px 8px 0;
            align-items: flex-end;
            text-align: right;
        }

        .param-card label {
            font-size: 9px;
            color: #94a3b8;
            margin-bottom: 4px;
            font-weight: bold;
        }

        .mini-wheel {
            color: var(--primary);
            font-size: 19px;
            font-weight: 900;
            line-height: 1;
            cursor: ns-resize;
            position: relative;
            display: inline-flex;
            align-items: baseline;
            user-select: none;
        }

        .mini-wheel::after {
            content: attr(data-unit);
            font-size: 10px;
            color: #64748b;
            margin-left: 2px;
            font-weight: 600;
        }

        .diff-tag {
            font-size: 11px;
            font-weight: 900;
            margin-top: 4px;
            letter-spacing: 0.5px;
            transition: color 0.3s;
        }

        .main-viewer {
            flex: 1;
            background: #000;
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            border: 1px solid #334155;
            box-shadow: 0 8px 25px rgba(0,0,0,0.6);
            min-width: 0;
        }

        .img-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            transition: opacity 0.1s linear;
            transform-origin: center center;
        }

        #laserCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
            touch-action: none;
        }

        .control-panel {
            flex: 0 0 auto;
            background: rgba(16, 24, 39, 0.95);
            border-radius: 20px;
            padding: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
        }

        .zoom-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        input[type=range] {
            width: 100%;
            -webkit-appearance: none;
            background: #1e293b;
            height: 5px;
            border-radius: 3px;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            background: #fff;
            border: 3px solid var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--primary);
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr 1.2fr;
            gap: 10px;
            margin-top: 15px;
        }

        .lux-btn {
            background: #1e293b;
            border: 1px solid #334155;
            padding: 12px;
            border-radius: 10px;
            color: #fff;
            font-size: 12px;
            font-weight: bold;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            cursor: pointer;
            user-select: none;
        }

        .btn-save {
            background: var(--primary);
            color: #000;
            border: none;
            box-shadow: 0 4px 15px rgba(0,242,254,0.3);
        }

        .btn-vault {
            background: transparent;
            color: var(--primary);
            border: 1px solid var(--primary);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            z-index: 9999;
            display: none;
            flex-direction: column;
            justify-content: flex-end;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.show {
            opacity: 1;
        }

        .vault-drawer {
            background: rgba(16, 24, 39, 0.98);
            width: 100%;
            max-height: 80vh;
            height: 75vh;
            border-radius: 24px 24px 0 0;
            padding: 20px;
            border-top: 1px solid var(--primary);
            display: flex;
            flex-direction: column;
            box-shadow: 0 -10px 40px rgba(0,242,254,0.15);
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .modal-overlay.show .vault-drawer {
            transform: translateY(0);
        }

        .drawer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 15px;
        }

        .drawer-header h3 {
            margin: 0;
            color: #fff;
            font-size: 18px;
            font-weight: 900;
            letter-spacing: 1px;
        }

        .close-btn {
            background: #334155;
            border: none;
            color: #fff;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-weight: bold;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        #vaultList {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 40px;
            scrollbar-width: none;
        }

        .v-item-wrap {
            position: relative;
            overflow: hidden;
            margin-bottom: 10px;
            border-radius: 12px;
            background: var(--danger);
        }

        .v-item-content {
            background: #1e293b;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #334155;
            border-radius: 12px;
            transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            position: relative;
            z-index: 2;
        }

        .v-text-area {
            flex: 1;
            min-width: 0;
            margin-right: 10px;
        }

        .v-title {
            display: block;
            color: var(--primary);
            font-size: 16px;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .v-sub {
            display: block;
            color: #94a3b8;
            font-size: 12px;
            margin-top: 4px;
        }

        .v-btn-load {
            flex: 0 0 auto;
            background: var(--primary);
            color: #000;
            border: none;
            padding: 8px 18px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 13px;
            box-shadow: 0 4px 10px rgba(0,242,254,0.3);
            cursor: pointer;
        }

        .delete-btn {
            position: absolute;
            right: 0;
            top: 0;
            height: 100%;
            width: 80px;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            z-index: 1;
        }

        @media (max-width: 768px) {
            .brand-text {
                font-size: 16px;
                letter-spacing: 1px;
            }

            .back-btn {
                left: 10px;
                font-size: 12px;
                padding: 4px 10px;
            }

            .params-side {
                flex: 0 0 84px;
            }

            .mini-wheel {
                font-size: 16px;
            }

            .diff-tag {
                font-size: 10px;
            }

            .btn-group {
                grid-template-columns: 1fr 1fr;
            }

            .btn-vault {
                grid-column: span 2;
            }
        }
    </style>
</head>
<body>
    <div class="header-brand">
        <a href="./index.html" class="back-btn">返回</a>
        <div class="brand-text">LUXIOU 全息数字化</div>
    </div>

    <div class="app-content">
        <div class="category-box" id="catBox"></div>

        <div class="stage-area">
            <div class="params-side" id="colL"></div>
            <div class="main-viewer" id="mainViewer">
                <div class="img-layer" id="layB" style="background-image:url('case_1.jpg'); opacity:1;"></div>
                <div class="img-layer" id="layA" style="background-image:url('case_2.jpg'); opacity:0;"></div>
                <canvas id="laserCanvas"></canvas>
            </div>
            <div class="params-side" id="colR"></div>
        </div>

        <div class="control-panel">
            <div class="zoom-row">
                <div>
                    <small style="color:var(--primary);font-size:10px;font-weight:bold;">前照变焦</small>
                    <input type="range" min="50" max="300" value="100" id="zoomB" oninput="zoomSlider('layB', this.value)">
                </div>
                <div>
                    <small style="color:var(--primary);font-size:10px;font-weight:bold;">后照变焦</small>
                    <input type="range" min="50" max="300" value="100" id="zoomA" oninput="zoomSlider('layA', this.value)">
                </div>
            </div>

            <div style="display:flex; justify-content:space-between; font-size:10px; color:#94a3b8; font-weight:bold; margin-bottom:5px;">
                <span>BEFORE</span>
                <span>中心滑动形变分析</span>
                <span>AFTER</span>
            </div>

            <input type="range" min="0" max="100" value="0" id="fadeSlider">

            <div class="btn-group">
                <div class="lux-btn" onclick="document.getElementById('fB').click()">📷 导入前照<input type="file" id="fB" hidden accept="image/*" onchange="processImg(this,'layB')"></div>
                <div class="lux-btn" onclick="document.getElementById('fA').click()">📷 导入后照<input type="file" id="fA" hidden accept="image/*" onchange="processImg(this,'layA')"></div>
                <div class="lux-btn btn-save" onclick="saveCase()">💾 保存案例</div>
                <div class="lux-btn btn-vault" onclick="openVault()">📂 历史档案库</div>
            </div>
        </div>
    </div>

    <div id="vaultModal" class="modal-overlay">
        <div class="vault-drawer">
            <div class="drawer-header">
                <h3>历史全息档案库</h3>
                <button class="close-btn" onclick="closeVault()">×</button>
            </div>
            <div id="vaultList"></div>
        </div>
    </div>

    <script>
        function cleanOldData() {
            let keysToDelete = [];
            for (let i = 0; i < localStorage.length; i++) {
                let key = localStorage.key(i);
                if (key && key.startsWith('LUX_') && key !== 'LUX_MASTER_V16') {
                    keysToDelete.push(key);
                }
            }
            keysToDelete.forEach(k => localStorage.removeItem(k));
        }

        const canvas = document.getElementById('laserCanvas');
        const ctx = canvas.getContext('2d');

        let imgState = {
            layB: { scale: 1, x: 0, y: 0 },
            layA: { scale: 1, x: 0, y: 0 }
        };

        let anchorsB = Array(6).fill(0).map((_, i) => ({ x: 0.5, y: 0.15 + i * 0.14 }));
        let anchorsA = Array(6).fill(0).map((_, i) => ({ x: 0.5, y: 0.15 + i * 0.14 }));
        let draggingIdx = -1;
        let currentUnit = "cm";

        const db = {
            posture: { name: "体态矫正", unit: "cm", labels: ["颈前引", "圆肩度", "高低肩", "盆前倾", "脊柱侧", "假胯宽"], pre: [8.5, 25.0, 2.5, 18.0, 12.0, 98.0], post: [2.1, 8.0, 0.2, 7.0, 2.0, 91.0] },
            shoulder: { name: "直角肩", unit: "°", labels: ["一字肩角", "斜方肌厚", "锁骨展度", "肩峰差值", "颈根宽度", "背平整度"], pre: [145.0, 5.8, 150.0, 1.5, 14.0, 12.0], post: [178.0, 3.1, 175.0, 0.2, 11.5, 4.0] },
            postpartum: { name: "产后康复", unit: "cm", labels: ["腹直肌隙", "耻骨宽度", "内脏脂肪", "盆底肌力", "腹围减寸", "腰腹度数"], pre: [3.5, 12.0, 15.0, 2.0, 95.0, 9.0], post: [0.2, 9.0, 5.0, 5.0, 78.0, 2.0] },
            muscle: { name: "增肌专场", unit: "cm", labels: ["上臂维度", "胸围增长", "大腿围度", "背阔肌展", "力量评级", "肌肉质量"], pre: [31.0, 95.0, 52.0, 88.0, 2.0, 35.0], post: [38.0, 115.0, 61.0, 112.0, 5.0, 72.0] },
            abs: { name: "马甲线", unit: "mm", labels: ["皮脂脂肪", "腹直肌隙", "腰围减寸", "侧腰厚度", "核心稳度", "腹部平坦"], pre: [28.0, 2.5, 82.0, 15.0, 35.0, 12.0], post: [10.0, 0.2, 65.0, 5.0, 120.0, 2.0] },
            fatloss: { name: "减脂塑形", unit: "%", labels: ["基础代谢", "内脏脂肪", "全身脂率", "BMI指数", "腰臀比例", "水分含量"], pre: [1250.0, 14.0, 35.0, 28.5, 0.92, 48.0], post: [1550.0, 4.0, 18.0, 22.1, 0.72, 62.0] },
            hip: { name: "蜜桃臀", unit: "cm", labels: ["臀围维度", "臀线高度", "大腿围度", "核心稳定", "臀中肌厚", "侧向支撑"], pre: [88.0, 5.2, 54.0, 3.0, 2.0, 15.0], post: [98.0, 2.1, 51.0, 9.0, 8.0, 85.0] }
        };

        function applyTransform(targetId) {
            const s = imgState[targetId];
            document.getElementById(targetId).style.transform = `translate(${s.x}px, ${s.y}px) scale(${s.scale})`;
        }

        function zoomSlider(targetId, val) {
            imgState[targetId].scale = val / 100;
            applyTransform(targetId);
        }

        function updateDiffs() {
            const lWheels = document.querySelectorAll('.card-l .mini-wheel');
            const rWheels = document.querySelectorAll('.card-r .mini-wheel');
            const diffTags = document.querySelectorAll('.diff-tag');

            for (let i = 0; i < 6; i++) {
                if (lWheels[i] && rWheels[i] && diffTags[i]) {
                    const lVal = parseFloat(lWheels[i].innerText) || 0;
                    const rVal = parseFloat(rWheels[i].innerText) || 0;
                    const diffNum = parseFloat((rVal - lVal).toFixed(1));
                    const sign = diffNum > 0 ? "+" : "";
                    diffTags[i].innerText = `${sign}${diffNum.toFixed(1)}${currentUnit}`;

                    if (diffNum < 0) {
                        diffTags[i].style.color = "var(--accent)";
                        diffTags[i].style.textShadow = "0 0 8px rgba(0,255,136,0.3)";
                    } else if (diffNum > 0) {
                        diffTags[i].style.color = "var(--danger)";
                        diffTags[i].style.textShadow = "0 0 8px rgba(255,71,87,0.3)";
                    } else {
                        diffTags[i].style.color = "#475569";
                        diffTags[i].style.textShadow = "none";
                    }
                }
            }
        }

        function initMiniWheel(el) {
            let startY = 0;
            let startVal = 0;
            let isMoving = false;

            el.addEventListener('click', () => {
                const newVal = prompt("请输入精准参数", el.innerText);
                if (newVal !== null && newVal !== "" && !isNaN(parseFloat(newVal))) {
                    el.innerText = parseFloat(newVal).toFixed(1);
                    updateDiffs();
                }
            });

            el.addEventListener('touchstart', e => {
                startY = e.touches[0].clientY;
                startVal = parseFloat(el.innerText) || 0;
                isMoving = true;
                e.preventDefault();
            }, { passive: false });

            el.addEventListener('touchmove', e => {
                if (!isMoving) return;
                const delta = (startY - e.touches[0].clientY) * 0.15;
                el.innerText = (startVal + delta).toFixed(1);
                updateDiffs();
                e.preventDefault();
            }, { passive: false });

            el.addEventListener('touchend', () => {
                isMoving = false;
            });
        }

        function draw() {
            const rect = canvas.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;

            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.scale(dpr, dpr);

            const w = rect.width;
            const h = rect.height;

            ctx.clearRect(0, 0, w, h);
            const v = document.getElementById('fadeSlider').value / 100;

            for (let i = 0; i < 6; i++) {
                const currX = anchorsB[i].x * (1 - v) + anchorsA[i].x * v;
                const currY = anchorsB[i].y * (1 - v) + anchorsA[i].y * v;

                const boxY = (i * (h / 6)) + (h / 12);
                ctx.strokeStyle = "rgba(0, 242, 254, 0.5)";
                ctx.lineWidth = 1.2;
                ctx.setLineDash([5, 4]);

                ctx.beginPath();
                ctx.moveTo(0, boxY);
                ctx.lineTo(currX * w, currY * h);
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(w, boxY);
                ctx.lineTo(currX * w, currY * h);
                ctx.stroke();

                ctx.setLineDash([]);
                ctx.fillStyle = "#00ff88";
                ctx.beginPath();
                ctx.arc(currX * w, currY * h, 5, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function loadSetup(key, el) {
            const d = db[key];
            currentUnit = d.unit;

            if (el) {
                document.querySelectorAll('.cat-item').forEach(i => i.classList.remove('active'));
                el.classList.add('active');
            }

            let hL = '';
            let hR = '';

            d.labels.forEach((l, i) => {
                hL += `<div class="param-card card-l"><label>${l}(前)</label><div class="mini-wheel" data-unit="${d.unit}">${d.pre[i].toFixed(1)}</div></div>`;
                hR += `<div class="param-card card-r"><label>${l}(后)</label><div class="mini-wheel" data-unit="${d.unit}">${d.post[i].toFixed(1)}</div><div class="diff-tag">0.0${d.unit}</div></div>`;
            });

            document.getElementById('colL').innerHTML = hL;
            document.getElementById('colR').innerHTML = hR;
            document.querySelectorAll('.mini-wheel').forEach(initMiniWheel);
            updateDiffs();
            draw();
        }

        function processImg(input, targetId) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = e => {
                const img = new Image();
                img.onload = () => {
                    const canvasTmp = document.createElement('canvas');
                    const maxW = 600;
                    const scale = img.width > maxW ? maxW / img.width : 1;

                    canvasTmp.width = img.width * scale;
                    canvasTmp.height = img.height * scale;
                    canvasTmp.getContext('2d').drawImage(img, 0, 0, canvasTmp.width, canvasTmp.height);

                    document.getElementById(targetId).style.backgroundImage = `url('${canvasTmp.toDataURL('image/jpeg', 0.6)}')`;
                    imgState[targetId] = { scale: 1, x: 0, y: 0 };

                    document.getElementById(targetId === 'layB' ? 'zoomB' : 'zoomA').value = 100;
                    applyTransform(targetId);
                    draw();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function safeGetVault() {
            try {
                return JSON.parse(localStorage.getItem('LUX_MASTER_V16') || '[]');
            } catch {
                return [];
            }
        }

        function saveCase() {
            const name = prompt("输入客户姓名保存：");
            if (!name) return;

            let vault = safeGetVault();

            const preVals = Array.from(document.querySelectorAll('.card-l .mini-wheel')).map(s => s.innerText);
            const postVals = Array.from(document.querySelectorAll('.card-r .mini-wheel')).map(s => s.innerText);

            const activeTypeEl = document.querySelector('.cat-item.active');
            const activeType = activeTypeEl ? activeTypeEl.innerText : "未分类";

            const newCase = {
                id: Date.now(),
                name,
                type: activeType,
                imgB: document.getElementById('layB').style.backgroundImage,
                imgA: document.getElementById('layA').style.backgroundImage,
                anchorsB,
                anchorsA,
                preVals,
                postVals,
                imgState: JSON.parse(JSON.stringify(imgState))
            };

            vault.unshift(newCase);

            let saved = false;
            while (vault.length > 0) {
                try {
                    localStorage.setItem('LUX_MASTER_V16', JSON.stringify(vault));
                    saved = true;
                    break;
                } catch (e) {
                    if (vault.length > 1) {
                        vault.pop();
                    } else {
                        break;
                    }
                }
            }

            if (saved) {
                alert("✅ 档案已成功保存！");
                renderVault();
            } else {
                alert("❌ 保存失败：手机浏览器空间不足，请删除部分旧档案后再试。");
            }
        }

        function openVault() {
            renderVault();
            const modal = document.getElementById('vaultModal');
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('show'), 10);
        }

        function closeVault() {
            const modal = document.getElementById('vaultModal');
            modal.classList.remove('show');
            setTimeout(() => {
                modal.style.display = 'none';
            }, 300);
        }

        function deleteItem(id) {
            let vault = safeGetVault();
            vault = vault.filter(i => i.id !== id);
            localStorage.setItem('LUX_MASTER_V16', JSON.stringify(vault));
            renderVault();
        }

        function loadCase(id) {
            const v = safeGetVault().find(x => x.id === id);
            if (!v) return;

            document.getElementById('layB').style.backgroundImage = v.imgB;
            document.getElementById('layA').style.backgroundImage = v.imgA;

            if (v.anchorsB && v.anchorsA) {
                anchorsB = v.anchorsB;
                anchorsA = v.anchorsA;
            }

            if (v.imgState && v.imgState.layB && v.imgState.layA) {
                imgState = v.imgState;
                document.getElementById('zoomB').value = imgState.layB.scale * 100;
                document.getElementById('zoomA').value = imgState.layA.scale * 100;
                applyTransform('layB');
                applyTransform('layA');
            }

            const lWheel = document.querySelectorAll('.card-l .mini-wheel');
            const rWheel = document.querySelectorAll('.card-r .mini-wheel');

            if (v.preVals && v.postVals) {
                v.preVals.forEach((s, i) => {
                    if (lWheel[i]) lWheel[i].innerText = s;
                });
                v.postVals.forEach((s, i) => {
                    if (rWheel[i]) rWheel[i].innerText = s;
                });
            }

            updateDiffs();
            draw();
            closeVault();
        }

        function renderVault() {
            const v = safeGetVault();
            const list = document.getElementById('vaultList');

            if (v.length === 0) {
                list.innerHTML = '<div style="text-align:center; color:#64748b; padding-top: 40px;">暂无历史档案</div>';
                return;
            }

            list.innerHTML = v.map(i => `
                <div class="v-item-wrap">
                    <div class="delete-btn" onclick="deleteItem(${i.id})">删除</div>
                    <div class="v-item-content" ontouchstart="swipeStart(event)" ontouchmove="swipeMove(event)" ontouchend="swipeEnd(event)">
                        <div class="v-text-area">
                            <span class="v-title">${i.name}</span>
                            <span class="v-sub">${i.type}</span>
                        </div>
                        <button class="v-btn-load" onclick="loadCase(${i.id})">载入全息</button>
                    </div>
                </div>
            `).join('');
        }

        let swipeX = 0;

        function swipeStart(e) {
            swipeX = e.touches[0].clientX;
            e.stopPropagation();
        }

        function swipeMove(e) {
            let diff = e.touches[0].clientX - swipeX;
            if (diff < 0 && diff > -80) {
                e.currentTarget.style.transform = `translateX(${diff}px)`;
            }
        }

        function swipeEnd(e) {
            let diff = e.changedTouches[0].clientX - swipeX;
            e.currentTarget.style.transform = diff < -40 ? `translateX(-80px)` : `translateX(0)`;
        }

        let isPanning = false;
        let isPinching = false;
        let lastPanX = 0;
        let lastPanY = 0;
        let initialPinchDist = 0;
        let initialScale = 1;
        let activeImgId = 'layB';

        const getActiveImgId = () => document.getElementById('fadeSlider').value < 50 ? 'layB' : 'layA';

        const getCoord = (e, axis, touchIdx = 0) => {
            const rect = canvas.getBoundingClientRect();
            const displayW = rect.width || 1;
            const displayH = rect.height || 1;
            const val = axis === 'x' ? e.touches[touchIdx].clientX : e.touches[touchIdx].clientY;
            return (val - (axis === 'x' ? rect.left : rect.top)) / (axis === 'x' ? displayW : displayH);
        };

        canvas.addEventListener('touchstart', e => {
            let slider = document.getElementById('fadeSlider');
            let v = slider.value / 100;
            activeImgId = getActiveImgId();

            if (e.touches.length === 1) {
                let displayPts = anchorsB.map((b, i) => ({
                    x: b.x * (1 - v) + anchorsA[i].x * v,
                    y: b.y * (1 - v) + anchorsA[i].y * v
                }));

                const x = getCoord(e, 'x');
                const y = getCoord(e, 'y');

                draggingIdx = displayPts.findIndex(a => Math.sqrt((a.x - x) ** 2 + (a.y - y) ** 2) < 0.08);

                if (draggingIdx !== -1) {
                    if (v <= 0.5) {
                        slider.value = 0;
                        document.getElementById('layA').style.opacity = 0;
                        document.getElementById('layB').style.opacity = 1;
                    } else {
                        slider.value = 100;
                        document.getElementById('layA').style.opacity = 1;
                        document.getElementById('layB').style.opacity = 0;
                    }
                    draw();
                    e.preventDefault();
                } else {
                    isPanning = true;
                    lastPanX = e.touches[0].clientX;
                    lastPanY = e.touches[0].clientY;
                }
            } else if (e.touches.length === 2) {
                isPinching = true;
                draggingIdx = -1;
                isPanning = false;
                initialPinchDist = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                initialScale = imgState[activeImgId].scale;
            }
        }, { passive: false });

        canvas.addEventListener('touchmove', e => {
            activeImgId = getActiveImgId();

            if (draggingIdx !== -1) {
                const targetSet = document.getElementById('fadeSlider').value < 50 ? anchorsB : anchorsA;
                targetSet[draggingIdx] = {
                    x: Math.max(0, Math.min(1, getCoord(e, 'x'))),
                    y: Math.max(0, Math.min(1, getCoord(e, 'y')))
                };
                draw();
                e.preventDefault();
            } else if (isPanning && e.touches.length === 1) {
                let dx = e.touches[0].clientX - lastPanX;
                let dy = e.touches[0].clientY - lastPanY;
                imgState[activeImgId].x += dx;
                imgState[activeImgId].y += dy;
                lastPanX = e.touches[0].clientX;
                lastPanY = e.touches[0].clientY;
                applyTransform(activeImgId);
                e.preventDefault();
            } else if (isPinching && e.touches.length === 2) {
                let currentDist = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );

                let scaleDiff = currentDist / initialPinchDist;
                let newScale = Math.max(0.5, Math.min(3, initialScale * scaleDiff));

                imgState[activeImgId].scale = newScale;
                document.getElementById(activeImgId === 'layB' ? 'zoomB' : 'zoomA').value = newScale * 100;
                applyTransform(activeImgId);
                e.preventDefault();
            }
        }, { passive: false });

        window.addEventListener('touchend', () => {
            draggingIdx = -1;
            isPanning = false;
            isPinching = false;
        });

        document.getElementById('fadeSlider').oninput = e => {
            document.getElementById('layA').style.opacity = e.target.value / 100;
            document.getElementById('layB').style.opacity = 1 - (e.target.value / 100);
            draw();
        };

        window.onload = () => {
            cleanOldData();
            document.getElementById('catBox').innerHTML = Object.keys(db).map((k, i) =>
                `<div class="cat-item ${i === 0 ? 'active' : ''}" onclick="loadSetup('${k}', this)">${db[k].name}</div>`
            ).join('');
            loadSetup('posture');
            setTimeout(draw, 100);
            window.addEventListener('resize', draw);
        };
    </script>
</body>
</html>
